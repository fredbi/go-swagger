name: Release

permissions:
  contents: read

# TODO: sign release artifacts

on:
  workflow_run:
    workflows:
      - test
    types:
      - completed
    tags:
      - 'v*'
    branches:
      - 'prepare-release/*'

env:
  EXTRA_ASSETS_DIR: ${{ github.workspace }}/../assets
  CLOUDSMITH_REPO: go-swagger/go-swagger

jobs:
  on-success:
    name: Ensure triggering workflow was successful
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "The triggering workflow was successful"

  on-failure:
    name: Triggering workflow was unsuccessful
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "The triggering workflow failed. Stopping here"
          exit 1

  update-doc:
    name: Build documentation site
    permissions:
      pages: write
      id-token: write
    needs: [on-success]
    uses: ./.github/workflows/update-doc.yaml
    with:
      secrets: inherits

  docker-release:
    name: Docker with release tag
    needs: [on-success]
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/build-docker.yaml
    with:
      push: true
      tagged: true
      latest: true
      record_retention: 90
    secrets:
      CR_PAT: ${{ secrets.CR_PAT }}
      QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
      QUAY_PASS: ${{ secrets.QUAY_PASS }}

  publish_release:
    name: Publish release
    needs: [on-success, docker-release, update-doc]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      -
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      -
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: "stable"
          check-latest: true
          cache: true
      -
        name: Install Tools
        run: |
          echo "none"
          # install syft?
          # install cosign
          # install release notes builder
      -
        name: Install UPX
        uses: crazy-max/ghaction-upx@db8cc9515a4a7ea1b312cb82fbeae6d716daf777 # v3.2.0
        with:
          install-only: true
      -
        name: UPX version
        run: upx --version
      -
        name: Download doc site artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          run-id: "${{ github.run_id }}"
          pattern: 'github-pages'
          path: ${{ env.EXTRA_ASSETS_DIR }}/docs
      -
        name: Build release notes
        run: |
          mkdir -p ${{ env.EXTRA_ASSETS_DIR}}/notes
          # TODO
          echo "none"
      -
        name: Build release
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: ${{ .github.ref_name }}
          args: >-
            release
              --clean
              --release-notes ${{ env.EXTRA_ASSETS_DIR }}/notes/${{ github.ref_name }}.md
              --fail-fast
              --debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: go-swagger
          GITHUB_REPOSITORY: go-swagger
          NOTES_ASSETS_DIR: ${{ env.extra_asserts_dir }}/notes
          DOC_ASSETS_DIR: ${{ env.extra_asserts_dir }}/docs
      -
        name: Install CloudSmith CLI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: cloudsmith-io/cloudsmith-cli-action@9c315294dcaf0bc33ede92e45ee3b63c32789684 # v1.0.8
        with:
          api-key: ${{ secrets.CLOUDSMITH_API_KEY }}
      -
        name: Push RPM package to CloudSmith
        # works for RedHat, CentOS, fedora, Suse...
        # TODO: add custom tags, e.g. "go-swagger"
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          cloudsmith push rpm --verbose
            ${{ env.CLOUDSMITH_REPO }}/any-distro/any-version
            dist/swagger-*.x86_64*.rpm

      -
        name: Push Deb package to CloudSmith
        # works for Debian, Ubuntu...
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          cloudsmith push deb --verbose
            ${{ env.CLOUDSMITH_REPO }}/any-distro/any-version
            dist/swagger-*.x86_64*.deb
